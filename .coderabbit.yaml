language: "ko-KR"
early_access: false

tone_instructions: |
  신입 개발자 팀의 성장을 위한 리뷰입니다.
  단순한 지적보다는 "이걸 쓰면 왜 더 좋은지" 원리를 친절하게 설명해주세요.
  수정 방법은 구체적이고 간단한 코드 예시(QueryDSL 쿼리, DTO 변환 등)와 함께 제안해주세요.
  훌륭하게 작성된 로직이나 개선된 아키텍처 패턴이 있다면 아낌없이 칭찬해주세요.

reviews:
  profile: "chill"
  request_changes_workflow: false
  high_level_summary: true
  poem: false
  review_status: true
  collapse_walkthrough: true
  auto_review:
    enabled: true
    auto_incremental_review: true
    drafts: false
    ignore_title_keywords:
      - "WIP"
      - "wip"

  path_filters:
    - "!src/main/generated/**"
    - "!.idea/**"
    - "!build/**"
    - "!**/application*.properties"

  path_instructions:

    - path: "src/main/java/**/domain/**/entity/**/*.java"
      instructions: |
        - 연관관계 필드에 FetchType.LAZY가 빠져 있으면 알려주세요.
        - enum 필드에 @Enumerated(EnumType.STRING) 이 없으면 알려주세요.
        - public setter 메서드가 있으면 비즈니스 메서드(의도 있는 메서드)로 캡슐화하도록 유도해주세요.

    - path: "src/main/java/**/domain/**/repository/**/*.java"
      instructions: |
        - 복잡한 dynamic 쿼리(조건에 따라 동적으로 변하는 검색 등)나 복잡한 JOIN이 레포지토리에 String이나 어노테이션 기반 쿼리로 작성되어 있다면, 컴파일 타임 에러 체크와 가독성을 위해 QueryDSL 도입을 친절히 권장해주세요.
        - 목록 조회 기능에서 페이징 처리를 누락하고 전량 조회(findAll)를 하고 있다면, OOM(Out of Memory) 방지를 위해 Pageable 파라미터와 Page/Slice 반환 타입 사용을 안내해주세요.
        - N+1 문제가 발생할 위험이 있는 쿼리는 @EntityGraph나 fetch join을 사용하도록 가이드해주세요.

    - path: "src/main/java/**/domain/**/service/**/*.java"
      instructions: |
        - 엔티티 조회 후 Optional.get()을 직접 호출하면 CustomException 사용을 권장해주세요.
        - 엔티티를 그대로 반환하면 DTO로 변환할 것을 권장해주세요.
        - [심화아키텍처] Service 레이어에서 다른 도메인의 Repository를 직접 참조하여 비즈니스 경계를 흐리게 하는 경우, 가급적 해당 도메인의 Service를 호출하도록 도메인 격리(Domain Isolation) 관점에서 부드럽게 제안해주세요.
        - 읽기 전용 메서드에 @Transactional(readOnly = true)가 누락되었다면, 성능 최적화를 위해 추가하도록 안내해주세요.

    - path: "src/main/java/**/domain/**/controller/**/*.java"
      instructions: |
        - 응답이 ApiResponse<T>로 감싸지지 않으면 알려주세요.
        - 요청 파라미터/바디에 @Valid 가 없으면 알려주세요.
        - 비즈니스 로직이 Controller에 직접 작성되어 있으면 Service로 분리하도록 안내해주세요.

    - path: "src/main/java/**/domain/**/dto/**/*.java"
      instructions: |
        - password 등 민감한 정보가 응답 필드에 포함되어 있으면 반드시 알려주세요.
        - Request/Response DTO 내부에 엔티티(Entity) 객체 자체가 필드로 직접 포함되어 있다면, 순환 참조 및 원하지 않는 데이터 노출 위험이 있으므로 별도의 하위 DTO 구조로 리팩토링하도록 권장해주세요.

    - path: "src/main/java/**/global/jwt/**/*.java"
      instructions: |
        - JWT payload에 password 등 민감한 정보가 포함되어 있으면 반드시 알려주세요.
        - 토큰 만료 또는 서명 검증 처리가 누락되어 있으면 알려주세요.

chat:
  auto_reply: true