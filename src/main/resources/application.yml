# ===================================================================
# 1. 공통 설정 (로컬과 운영 모두 적용됨)
# ===================================================================
spring:
  application:
    name: sangsangseoga
  mandatory-file-encoding: UTF-8

  # 아무런 옵션 없이 서버를 켜면 자동으로 로컬 개발 환경(dev)이 실행됩니다.
  profiles:
    default: dev

  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB

server:
  servlet:
    encoding:
      charset: UTF-8
      enabled: true

jwt:
  access-token-expiration: 3600000       # 1시간 (밀리초)
  refresh-token-expiration: 2592000000   # 30일 (밀리초)
  
gemini:
  api:
    key: ${GEMINI_API_KEY}
    model: ${GEMINI_MODEL:gemini-2.5-flash}
    url: https://generativelanguage.googleapis.com/v1beta/models/${gemini.api.model}:generateContent

replicate:
  api:
    # 아직 실제로 호출하는 서비스가 없는 예비 설정값(ReplicateClient 미구현 스텁). 값이 없어도 기동에는 문제없음.
    token: ${REPLICATE_API_TOKEN:}

fastapi:
  base-url: ${FASTAPI_BASE_URL:http://localhost:8000}

# 로컬 디스크에 저장하는 업로드 파일(프로필 사진 등)의 루트 경로. 정적 리소스 핸들러(/uploads/**)가 이 경로를 서빙한다.
app:
  upload-dir: ${UPLOAD_DIR:./uploads}

  # 업로드 파일 저장 방식. local(기본값)/s3. s3로 바꾸면 S3FileStorageService가 활성화된다.
  storage:
    type: ${STORAGE_TYPE:local}

  # storage.type=s3일 때만 사용됨. 자격증명은 여기 넣지 않고(로컬은 ~/.aws/credentials 또는
  # 환경변수, EC2는 인스턴스에 붙인 IAM Role) DefaultCredentialsProvider가 알아서 찾는다.
  s3:
    bucket: ${S3_BUCKET:}
    region: ${S3_REGION:ap-northeast-2}
    public-base-url: ${S3_PUBLIC_BASE_URL:}   # CloudFront 등 실제 서빙 도메인. 비워두면 S3 버킷 기본 URL 사용

oauth:
  kakao:
    client-id: ${KAKAO_CLIENT_ID:}
    client-secret: ${KAKAO_CLIENT_SECRET:}   # 카카오 콘솔에서 Client Secret을 활성화한 경우에만 필요
  naver:
    client-id: ${NAVER_CLIENT_ID:}
    client-secret: ${NAVER_CLIENT_SECRET:}

---
# ===================================================================
# 2. 로컬 개발 환경 (dev) - 기본 실행 환경
# ===================================================================
spring:
  config:
    activate:
      on-profile: dev

  datasource:
    driver-class-name: org.mariadb.jdbc.Driver
    url: jdbc:mariadb://localhost:3306/sangsangseoga
    username: ${DB_USERNAME:root} # 환경변수 없으면 root 사용
    password: ${DB_PASSWORD:7564}     # 환경변수 없으면 빈값 사용


  jpa:
    show-sql: true
    hibernate:
      ddl-auto: update            # 개발 단계에서는 테이블 자동 생성/수정
    properties:
      hibernate:
        format_sql: true
        highlight_sql: true
        use_sql_comments: true

  redis:
    host: ${REDIS_HOST:localhost}
    port: ${REDIS_PORT:6379}

  # docker-compose의 Mailhog로 발송한다. 인증 없이 로컬에서만 받는 가짜 SMTP라 실제 메일함으로는 안 감.
  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false

# 로컬 개발용 상세 로그 및 JWT 기본값
logging:
  level:
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE

jwt:
  secret-key: ${JWT_SECRET_KEY:defaultSecretKeySecretKeySecretKeySecretKeySecretKey}

app:
  frontend-url: ${FRONTEND_URL:http://localhost:5173}
  mail-from: ${MAIL_FROM:no-reply@sangsangseoga.local}

---
# ===================================================================
# 3. 실제 배포 환경 (prod) - 보안 및 성능 최적화
# ===================================================================
spring:
  config:
    activate:
      on-profile: prod

  datasource:
    driver-class-name: org.mariadb.jdbc.Driver
    url: jdbc:mariadb://${PROD_DB_HOST}:3306/sangsangseoga # 운영 DB 호스트 주소 필수
    username: ${PROD_DB_USERNAME} # 기본값 없음 (배포 환경변수 필수 주입)
    password: ${PROD_DB_PASSWORD} # 기본값 없음 (배포 환경변수 필수 주입)

  jpa:
    show-sql: false               # 성능을 위해 쿼리 콘솔 출력 차단
    hibernate:
      ddl-auto: validate          # 운영 서버의 실제 데이터 보호를 위해 테이블 구조 검증만 수행

  redis:
    host: ${PROD_REDIS_HOST}      # 운영 Redis 주소 필수
    port: ${PROD_REDIS_PORT:6379}

  mail:
    host: ${MAIL_HOST}            # 운영 SMTP 호스트 필수 (예: Gmail, AWS SES SMTP 등)
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

# 운영 환경에서는 API 구조(엔드포인트/DTO/스키마) 노출을 막기 위해 Swagger를 비활성화
springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

jwt:
  secret-key: ${JWT_SECRET_KEY}   # 기본값 없음 (누락 시 서버 구동 실패 처리로 해킹 방지)

app:
  frontend-url: ${FRONTEND_URL}   # 기본값 없음 (운영 프론트 도메인 필수 주입)
  mail-from: ${MAIL_FROM}         # 기본값 없음 (발신 메일 주소 필수 주입)
