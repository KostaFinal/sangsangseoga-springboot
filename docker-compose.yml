version: "3.8"

services:
  redis:
    image: redis:7-alpine
    container_name: sangsangseoga-redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  mailhog:
    image: mailhog/mailhog:latest
    container_name: sangsangseoga-mailhog
    ports:
      - "1025:1025"  # SMTP
      - "8025:8025"  # 웹 UI (도착한 메일 확인)
    restart: unless-stopped
